services:
  postgres:
    image: postgres:16
    container_name: ${POSTGRES_DATABASE_NAME}
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${POSTGRES_DATABASE_NAME}
      POSTGRES_USER: ${POSTGRES_USERNAME}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: ${REDIS_NAME}
    volumes:
      - redis_data:/data
    ports:
      - '${REDIS_PORT}:6379'

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local